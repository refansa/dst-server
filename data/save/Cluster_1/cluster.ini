; =============================================================================
; cluster.ini — Global cluster configuration
; =============================================================================
; Reference: https://forums.kleientertainment.com/forums/topic/64552-dedicated-server-settings-guide/
;
; This file sits in the cluster root (e.g. Cluster_1/) and governs every shard
; in the cluster. Settings marked "Master cluster.ini only" below (like
; cluster_name, cluster_password) are only read from the Master's copy of this
; file. Settings marked "Must match in each cluster.ini" must be identical
; across all machines if shards run on different hosts.
; =============================================================================


[GAMEPLAY]
; game_mode — survival | endless | wilderness
;   survival:    classic — ghost on death, revive via touchstone / meat effigy
;   endless:     respawn at the portal with a max-health penalty
;   wilderness:  permadeath, random spawn location
game_mode = endless

; max_players — 1..64. Hard cap on concurrent connections.
max_players = 16

; pause_when_empty — true | false
;   true:  simulation freezes when the last player disconnects (saves CPU)
;   false: world keeps running 24/7 regardless of player count
pause_when_empty = true

; pvp — true | false. Enable player-vs-player damage.
pvp = false


[NETWORK]
; cluster_name — the name players see in the server browser.
; Overridable via setup.ps1/setup.sh -> CLUSTER_NAME env var.
cluster_name = Hallownest

; cluster_description — shown in the server details panel.
cluster_description = Here Lies The World

; cluster_password — leave blank for a public server.
; Overridable via setup.ps1/setup.sh -> CLUSTER_PASSWORD env var.
cluster_password = frend

; cluster_intention — cooperative | competitive | social | madness
;   Categories the server in the browser filter.
cluster_intention = cooperative

; lan_only_cluster — true | false. Restrict to local network only.
lan_only_cluster = false

; tick_rate — 15..60. Server ticks per second.
;   15 is the default and works for most servers.
;   Higher values (20, 30) improve precision but cost more CPU and bandwidth.
;   Must be evenly divisible into 60.
tick_rate = 15


[MISC]
; console_enabled — true | false
;   When true, admin can execute Lua commands via docker exec.
;   Example: docker exec -i dst-master bash -c 'echo "c_save()" > /proc/1/fd/0'
console_enabled = true

; max_snapshots — number of rollback snapshots retained (default: 6)
;   Higher values consume more disk but give more restore points.
;   See also: scripts/backup-world.ps1 for filesystem-level backups.
max_snapshots = 20


[SHARD]
; shard_enabled — true | false
;   Must be true for multi-shard setups (Overworld + Caves).
;   Must match in each cluster.ini if shards run on different machines.
shard_enabled = true

; bind_ip — address the master shard listens on for slave connections.
;   0.0.0.0 = all interfaces (required when shards run in separate containers).
bind_ip = 0.0.0.0

; master_ip — hostname/IP that non-master shards use to reach the master.
;   Here it's "dst-master", which Docker DNS resolves to the master container.
master_ip = dst-master

; master_port — UDP port for inter-shard communication (internal, container-only).
master_port = 10888

; cluster_key — shared secret that authenticates slave shards to the master.
;   CHANGE THIS to a random string before deploying publicly.
cluster_key = dst_cluster_key
