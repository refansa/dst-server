; =============================================================================
; Master/server.ini — Overworld shard configuration
; =============================================================================
; Reference: https://forums.kleientertainment.com/forums/topic/64552-dedicated-server-settings-guide/
;
; This shard runs the Overworld and acts as the cluster master.
; Slave shards (Caves) connect to this shard over the internal Docker network.
; =============================================================================


[NETWORK]

; server_port — UDP port players connect to.
;   Must be between 10998–11018 inclusive for LAN visibility.
server_port = 10999


[SHARD]

; is_master — exactly ONE shard per cluster must be the master.
is_master = true

; name — ignored for the master shard (always shows as [SHDMASTER] in logs).
name = Master

; id — auto-generated on first run. DO NOT change after world creation.
id = 1


[STEAM]

; master_server_port — Steam master server port.
;   Must be different for every shard on the same machine.
master_server_port = 27016

; authentication_port — Steam authentication port.
;   Must be different for every shard on the same machine.
authentication_port = 8766


[ACCOUNT]
encode_user_path = true
