; =============================================================================
; Caves/server.ini — Caves shard configuration
; =============================================================================
; Reference: https://forums.kleientertainment.com/forums/topic/64552-dedicated-server-settings-guide/
;
; This shard runs the Underground / Caves world and connects to the Master
; shard as a slave. It only starts after the Master is healthy (see
; docker-compose.yml depends_on + healthcheck).
; =============================================================================


[NETWORK]
; server_port — UDP port players connect to for this shard.
;   Must be different from Master's server_port.
server_port = 11000


[SHARD]
; is_master — false for all non-master shards.
is_master = false

; name — shard name shown in logs (e.g. [SHDCaves]).
name = Caves

; id — auto-generated on first run. DO NOT change after world creation.
id = 2

; master_ip — Docker DNS name of the master container.
master_ip = dst-master

; master_port — must match the master's master_port in cluster.ini.
master_port = 10888


[STEAM]
; master_server_port — must differ from Master's.
master_server_port = 27017

; authentication_port — must differ from Master's.
authentication_port = 8767
